spring:
  application:
    name: fintrack-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintrack}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mvc:
    format:
      date: yyyy-MM-dd

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

application:
  security:
    jwt:
      secret: ${JWT_SECRET:SGu6/B1JYLYpH0Y8i/HK7oXCs2Bxtfo0O1eKGO4J0JQXGKfr9jX4IJzhHTV7hC6zFK/Y6XjlL/YvCjp7uqj5wg==}
      expiration: ${JWT_EXPIRATION:86400000}